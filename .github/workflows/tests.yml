name: Tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Validate SkitBox
        shell: pwsh
        run: |
          $data = Join-Path $env:RUNNER_TEMP "SkitBoxData"
          New-Item -ItemType Directory -Force -Path $data, $env:RUNNER_TEMP | Out-Null
          $env:SKITBOX_DISABLE_OPEN = "1"
          $env:SKITBOX_HOME = $data
          $env:TEMP = $env:RUNNER_TEMP
          $env:TMP = $env:RUNNER_TEMP
          python -m unittest discover -s tests
          python -m compileall sitcom_engine_app tests scripts
          python scripts\sample_episodes.py --count 2 --room kitchen
          python scripts\sample_memory.py --room kitchen
          python -m sitcom_engine_app.app --doctor
